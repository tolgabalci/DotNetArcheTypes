name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore MermaidNotes.slnx
      - name: Build
        run: dotnet build MermaidNotes.slnx --configuration Release --no-restore
      - name: Test
        run: dotnet test tests/api/MermaidNotes.Api.Tests.csproj --configuration Release --no-build --logger trx

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: src/web/package-lock.json
      - name: Install
        working-directory: src/web
        run: npm ci
      - name: Test
        working-directory: src/web
        run: npm test
      - name: Build
        working-directory: src/web
        run: npm run build

  infrastructure:
    name: Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: infra/cdk/package-lock.json
      - name: Install
        working-directory: infra/cdk
        run: npm ci
      - name: Build
        working-directory: infra/cdk
        run: npm run build
      - name: Test
        working-directory: infra/cdk
        run: npm test
      - name: Synth
        working-directory: infra/cdk
        run: npm run synth -- --context githubOwner=replace-me --context githubRepo=replace-me
